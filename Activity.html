    <div id="media-modal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">

            <div class="flex-1 bg-black overflow-hidden flex items-center justify-center">
                <div id="modal-content-area" class="w-full h-full flex items-center justify-center" style="min-height: 450px; transition: all 0.3s ease;">
                </div>
            </div>
        </div>

    <script>
        // Star Trail Effect applied to the whole window
        const starContainer = document.getElementById('star-container');

        window.addEventListener('mousemove', (e) => {
            const star = document.createElement('div');

            const size = Math.random() * 2 + 1;
            const initialOpacity = Math.random() * 0.5 + 0.5;

            star.style.position = 'absolute';
            star.style.left = `${e.clientX}px`;
            star.style.top = `${e.clientY}px`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.backgroundColor = '#ffffff';
            star.style.borderRadius = '50%';
            star.style.pointerEvents = 'none';
            star.style.opacity = initialOpacity;
            star.style.boxShadow = '0 0 6px rgba(255, 255, 255, 0.8)';
            star.style.transform = 'translate(-50%, -50%)';
            star.style.transition = 'all 0.8s cubic-bezier(0.25, 1, 0.5, 1)';

            starContainer.appendChild(star);

            requestAnimationFrame(() => {
                const yOffset = Math.random() * 20 + 10;
                star.style.transform = `translate(-50%, calc(-50% + ${yOffset}px)) scale(0)`;
                star.style.opacity = '0';
            });

            setTimeout(() => {
                if(starContainer.contains(star)) {
                    star.remove();
                }
            }, 800);
        });

        // Modal Logic
        const fileMap = {
            "Activity 1": "TapiaKimYuriBSIS3AG2_FL101_Activity1_Speaking.mp4",
            "Activity 2": "TapiaKimYuriBSIS3AG2_FL101_Activity2_HanziWritting.mp4",
            "Activity 3": "TapiaKimYuriBSIS3AG2_FL101_Activity3_Listening.m4a",
            "Activity 4": "TapiaKimYuriBSIS3AG2_FL101_Activity4_Conversation.mp4",
            "Activity 5": "TapiaKimYuriBSIS3AG2_FL101_Activity5_HanziStroke.jpg",
            "Activity 6": "Act6.mp4",
            "Activity 7": "TapiaKimYuriBSIS3AG2_FL101_Activity7_Ordering Foods at McDonald_s.mp4",
        };

        const modal = document.getElementById('media-modal');
        const modalInner = document.getElementById('modal-inner');
        const modalTitle = document.getElementById('modal-title');
        const modalFilename = document.getElementById('modal-filename');
        const modalContentArea = document.getElementById('modal-content-area');
        const closeModalBtn = document.getElementById('close-modal');
        const activityBtns = document.querySelectorAll('.activity-btn');

        function openModal(title) {
            const fileName = fileMap[title] || "file_not_found.mp4";
            const ext = fileName.split('.').pop().toLowerCase();

            modalTitle.textContent = title;
            modalFilename.textContent = fileName;
            modalContentArea.innerHTML = '';

            if (['mp4', 'webm', 'ogg'].includes(ext)) {
                modalContentArea.innerHTML = `
                    <video controls autoplay class="w-full max-h-full outline-none">
                        <source src="${fileName}" type="video/mp4">
                        Your browser does not support video.
                    </video>`;
            }
            else if (['m4a', 'mp3', 'wav'].includes(ext)) {
                modalContentArea.className = "w-full h-full bg-[#050505] flex items-center justify-center";
                modalContentArea.innerHTML = `
                    <div class="text-center">
                        <iconify-icon icon="solar:music-notes-linear" stroke-width="1.5" class="text-6xl text-white mb-6 opacity-80"></iconify-icon>
                        <audio controls autoplay class="block mx-auto outline-none grayscale opacity-90 hover:opacity-100 transition-opacity">
                            <source src="${fileName}" type="audio/x-m4a">
                        </audio>
                        <p class="mt-5 text-sm font-medium text-gray-400">Playing Audio Recording</p>
                    </div>`;
            }
            else if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) {
                modalContentArea.innerHTML = `<img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/917d6f93-fb36-439a-8c48-884b67b35381_1600w.jpg" class="max-w-full max-h-full object-contain" alt="Preview">`;
            }
            else if (ext === 'pdf') {
                modalContentArea.innerHTML = `<iframe src="${fileName}" class="w-full h-full" style="border:none;"></iframe>`;
            }

            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalInner.classList.remove('scale-95', 'opacity-0');
                modalInner.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalInner.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modalContentArea.innerHTML = '';
                modal.classList.add('hidden');
            }, 300);
        }

        activityBtns.forEach(btn => {
            btn.addEventListener('click', () => openModal(btn.getAttribute('data-title')));
        });

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
        });
    </script>
