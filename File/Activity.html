    <div id="media-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div id="modal-inner" class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl border border-gray-100/50 overflow-hidden transform scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[90vh]">

            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0 bg-white">
                <div>
                    <h3 id="modal-title" class="text-base font-semibold text-[#2D3748]">Activity Details</h3>
                    <p id="modal-filename" class="text-[10px] uppercase tracking-widest text-gray-400 mt-0.5"></p>
                </div>
                <button id="close-modal" class="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-red-50 flex items-center justify-center">

                </button>
            </div>

            <div class="flex-1 bg-black overflow-hidden flex items-center justify-center">
                <div id="modal-content-area" class="w-full h-full flex items-center justify-center">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Mapping of Title to the Filenames you provided
        const fileMap = {
            "Activity 1": "TapiaKimYuriBSIS3AG2_FL101_Activity1_Speaking.mp4",
            "Activity 2": "TapiaKimYuriBSIS3AG2_FL101_Activity2_HanziWritting.mp4",
            "Activity 3": "TapiaKimYuriBSIS3AG2_FL101_Activity3_Listening.m4a",
            "Activity 4": "TapiaKimYuriBSIS3AG2_FL101_Activity4_Conversation.mp4",
            "Activity 5": "TapiaKimYuriBSIS3AG2_FL101_Activity5_HanziStroke.jpg",
            "Activity 6": "Act6.mp4",
            "Activity 7": "TapiaKimYuriBSIS3AG2_FL101_Activity7_Ordering Foods at McDonald_s.mp4",
        };

        const modal = document.getElementById('media-modal');
        const modalInner = document.getElementById('modal-inner');
        const modalTitle = document.getElementById('modal-title');
        const modalFilename = document.getElementById('modal-filename');
        const modalContentArea = document.getElementById('modal-content-area');
        const closeModalBtn = document.getElementById('close-modal');
        const activityBtns = document.querySelectorAll('.activity-btn');

        function openModal(title) {
            const fileName = fileMap[title] || "file_not_found.mp4";
            const ext = fileName.split('.').pop().toLowerCase();

            modalTitle.textContent = title;
            modalFilename.textContent = fileName;
            modalContentArea.innerHTML = ''; // Clear previous

            // Logic to determine what to show
            if (['mp4', 'webm', 'ogg'].includes(ext)) {
                modalContentArea.innerHTML = `
                    <video controls autoplay class="w-full max-h-full">
                        <source src="${fileName}" type="video/mp4">
                        Your browser does not support video.
                    </video>`;
            }
            else if (['m4a', 'mp3', 'wav'].includes(ext)) {
                modalContentArea.className = "w-full h-full bg-gray-50 flex items-center justify-center";
                modalContentArea.innerHTML = `
                    <div class="text-center">
                        <iconify-icon icon="solar:music-notes-bold-duotone" class="text-6xl text-[#C53030] mb-4"></iconify-icon>
                        <audio controls autoplay class="block mx-auto">
                            <source src="${fileName}" type="audio/x-m4a">
                        </audio>
                        <p class="mt-4 text-sm text-gray-400">Playing Audio Recording</p>
                    </div>`;
            }
            else if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) {
                modalContentArea.innerHTML = `<img src="${fileName}" class="max-w-full max-h-full object-contain" alt="Preview">`;
            }
            else if (ext === 'pdf') {
                modalContentArea.innerHTML = `<iframe src="${fileName}" class="w-full h-full" style="border:none;"></iframe>`;
            }

            // Show Modal
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalInner.classList.remove('scale-95', 'opacity-0');
                modalInner.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeModal() {
            // Kill media (stop sound/video)
            modalContentArea.innerHTML = '';

            modal.classList.add('opacity-0');
            modalInner.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        activityBtns.forEach(btn => {
            btn.addEventListener('click', () => openModal(btn.getAttribute('data-title')));
        });

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // Escape key to close
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
        });
    </script>
